on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags like v1.0.0

name: Build and Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: 'build/libs/*.jar'